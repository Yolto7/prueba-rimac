# serverless.yml
service: aws-lambda-people
frameworkVersion: "3"
useDotenv: true

provider:
  name: aws
  versionFunctions: false
  runtime: nodejs14.x
  region: us-east-1
  stage: dev
  timeout: 20
  environment:
    NODE_ENV: ${env:NODE_ENV}
    DB_USER: ${env:DB_USER}
    DB_PASS: ${env:DB_PASS}
    DB_HOST: ${env:DB_HOST}
    DB_NAME: ${env:DB_NAME}
    DB_PORT: ${env:DB_PORT}
    TR_PAPERTRAIL_HOST: ${env:TR_PAPERTRAIL_HOST}
    TR_PAPERTRAIL_PORT: ${env:TR_PAPERTRAIL_PORT}
    TR_PAPERTRAIL_LOGLEVEL: ${env:TR_PAPERTRAIL_LOGLEVEL}
    SWAPI_URL: ${env:SWAPI_URL}

functions:
  getAllBySwapi:
    handler: src/index.handler
    events:
      - http:
          path: /people/swapi
          method: get

  getAll:
    handler: src/index.handler
    events:
      - http:
          path: /people
          method: get

  create:
    handler: src/index.handler
    events:
      - http:
          path: /people
          method: post

plugins:
  - serverless-offline
  - serverless-plugin-typescript